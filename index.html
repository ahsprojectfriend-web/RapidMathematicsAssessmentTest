<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Araullo HS - Project CARE</title>
    <style>
        :root { --maroon: #800000; --white: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #2c3e50; color: white; margin: 0; padding: 0; overflow: hidden; position: fixed; width: 100%; height: 100%; }
        
        #header { background: var(--maroon); padding: 10px; border-bottom: 3px solid #4d0000; z-index: 1000; height: 100px; box-sizing: border-box; }
        .info-input { padding: 8px; border-radius: 4px; border: 1px solid #ccc; margin: 2px; width: 130px; font-size: 14px; }
        
        #progress-container { width: 90%; background: #4d0000; height: 8px; margin: 5px auto; border-radius: 4px; overflow: hidden; }
        #progress-fill { height: 100%; background: #27ae60; width: 0%; transition: width 0.3s; }
        #q-counter { font-size: 0.85em; font-weight: bold; }

        /* Question Layout */
        #exam-container { height: calc(100vh - 180px); overflow-y: auto; padding: 10px 0; }
        .q-wrapper { display: none; width: 100%; }
        .q-wrapper.active { display: block; }

        .q-box { background: var(--white); color: #333; border-radius: 12px; margin: 0 auto; width: 92%; max-width: 850px; padding: 15px; text-align: left; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; height: 100%; box-sizing: border-box; }
        .q-text { font-size: 1.05em; font-weight: bold; margin-bottom: 5px; color: var(--maroon); }
        .q-img { max-height: 150px; width: auto; object-fit: contain; margin-bottom: 10px; border: 1px solid #eee; }

        /* THE ENTIRE BOX IS DRAWABLE */
        .canvas-container { 
            flex-grow: 1;
            border: 2px dashed #bdc3c7; 
            background: #fff; 
            position: relative; 
            border-radius: 8px; 
            min-height: 300px;
            touch-action: none;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; touch-action: none; cursor: crosshair; }

        .tool-bar { margin-top: 10px; display: flex; gap: 5px; }
        .btn-tool { padding: 10px; border: none; border-radius: 4px; font-weight: bold; color: white; flex: 1; cursor: pointer; font-size: 12px; }
        .btn-undo { background: #f39c12; }
        .btn-redo { background: #3498db; }
        .btn-clear { background: #e74c3c; }

        .nav-footer { height: 80px; background: #34495e; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .btn-nav { padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px; color: white; }
        .btn-back { background: #7f8c8d; }
        .btn-next { background: var(--maroon); min-width: 100px; }
        .btn-submit { background: #27ae60; min-width: 140px; }
        button:disabled { opacity: 0.3; }
    </style>
</head>
<body>
    <div id="header">
        <input type="text" id="section" class="info-input" placeholder="Section">
        <input type="text" id="student" class="info-input" placeholder="Full Name">
        <div id="progress-container"><div id="progress-fill"></div></div>
        <span id="q-counter">Question 1 of 47</span>
    </div>

    <div id="exam-container"></div>

    <div class="nav-footer">
        <button id="prevBtn" class="btn-nav btn-back" onclick="changeQuestion(-1)">BACK</button>
        <button id="nextBtn" class="btn-nav btn-next" onclick="changeQuestion(1)">NEXT</button>
        <button id="finalSubmitBtn" class="btn-nav btn-submit" style="display:none;" onclick="submitAll()">SUBMIT</button>
    </div>

    <script>
        const rmaQuestions = [
            { text: "1. Verify Box 1: computation for 4 × 4 − 5 × 3.", img: "box1.png" },
            { text: "2. Next number expression after 5 × 5 − 6 × 4 in Box 1?", img: "box1.png" },
            { text: "3. Algebraic expression representing Box 1? (Select a-e)", img: "box1.png" },
            // ... (Add your other 44 questions here) ...
            { text: "47. Degrees of rotation after 5 rolls?", img: "fig10.png" }
        ];

        let currentIdx = 0;
        const canvasHistory = {};
        const container = document.getElementById('exam-container');

        // Build Structure
        rmaQuestions.forEach((q, i) => {
            const qNum = i + 1;
            canvasHistory[qNum] = { undoStack: [], redoStack: [] };
            let imgHtml = q.img ? `<img src="/static/${q.img}" class="q-img">` : '';
            container.innerHTML += `
                <div class="q-wrapper" id="wrap${i}">
                    <div class="q-box">
                        <div class="q-text">Q${qNum}: ${q.text}</div>
                        ${imgHtml}
                        <div class="canvas-container" id="cont${qNum}">
                            <canvas id="q${qNum}"></canvas>
                        </div>
                        <div class="tool-bar">
                            <button class="btn-tool btn-undo" id="undo${qNum}" onclick="undo(${qNum})" disabled>Undo</button>
                            <button class="btn-tool btn-redo" id="redo${qNum}" onclick="redo(${qNum})" disabled>Redo</button>
                            <button class="btn-tool btn-clear" onclick="safeClear(${qNum})">Clear</button>
                        </div>
                    </div>
                </div>`;
        });

        // DRAWING ENGINE
        function initDrawing(qNum) {
            const canvas = document.getElementById('q' + qNum);
            const cont = document.getElementById('cont' + qNum);
            const ctx = canvas.getContext('2d');

            // FORCE RESIZE: Crucial fix for "can't draw"
            if (canvas.width !== cont.clientWidth) {
                canvas.width = cont.clientWidth;
                canvas.height = cont.clientHeight;
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.strokeStyle = '#000000';
                
                // If it's the first time, save the blank state
                if(canvasHistory[qNum].undoStack.length === 0) {
                    saveState(qNum, canvas);
                }
            }

            let drawing = false;

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const start = (e) => {
                drawing = true;
                const p = getPos(e);
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                e.preventDefault();
            };

            const move = (e) => {
                if (!drawing) return;
                const p = getPos(e);
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
                e.preventDefault();
            };

            const stop = () => {
                if (drawing) {
                    drawing = false;
                    saveState(qNum, canvas);
                }
            };

            // Unified Listeners
            canvas.onpointerdown = start;
            canvas.onpointermove = move;
            window.onpointerup = stop;
        }

        function showQuestion(idx) {
            document.querySelectorAll('.q-wrapper').forEach((el, i) => el.classList.toggle('active', i === idx));
            
            // Wait for display to update then init canvas
            setTimeout(() => initDrawing(idx + 1), 100);

            document.getElementById('prevBtn').disabled = (idx === 0);
            document.getElementById('nextBtn').style.display = (idx === rmaQuestions.length - 1) ? 'none' : 'inline-block';
            document.getElementById('finalSubmitBtn').style.display = (idx === rmaQuestions.length - 1) ? 'inline-block' : 'none';
            document.getElementById('q-counter').innerText = `Question ${idx + 1} of ${rmaQuestions.length}`;
            document.getElementById('progress-fill').style.width = `${((idx + 1) / rmaQuestions.length) * 100}%`;
        }

        function changeQuestion(step) {
            currentIdx += step;
            showQuestion(currentIdx);
        }

        function saveState(n, canvas) {
            const h = canvasHistory[n];
            h.undoStack.push(canvas.toDataURL());
            if(h.undoStack.length > 20) h.undoStack.shift();
            h.redoStack = [];
            updateTools(n);
        }

        function undo(n) {
            const h = canvasHistory[n]; if (h.undoStack.length <= 1) return;
            const canvas = document.getElementById('q' + n);
            const ctx = canvas.getContext('2d');
            h.redoStack.push(h.undoStack.pop());
            const img = new Image();
            img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };
            img.src = h.undoStack[h.undoStack.length - 1];
            updateTools(n);
        }

        function redo(n) {
            const h = canvasHistory[n]; if (h.redoStack.length === 0) return;
            const canvas = document.getElementById('q' + n);
            const ctx = canvas.getContext('2d');
            const data = h.redoStack.pop(); h.undoStack.push(data);
            const img = new Image();
            img.onload = () => { ctx.clearRect(0,0,canvas.width,canvas.height); ctx.drawImage(img,0,0); };
            img.src = data;
            updateTools(n);
        }

        function safeClear(n) {
            if (confirm("Clear answer for Q" + n + "?")) {
                const canvas = document.getElementById('q' + n);
                canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height);
                saveState(n, canvas);
            }
        }

        function updateTools(n) {
            const h = canvasHistory[n];
            document.getElementById('undo' + n).disabled = h.undoStack.length <= 1;
            document.getElementById('redo' + n).disabled = h.redoStack.length === 0;
        }

        async function submitAll() {
            const btn = document.getElementById('finalSubmitBtn');
            btn.disabled = true; btn.innerText = "UPLOADING...";
            const data = {
                section: document.getElementById('section').value || "NA",
                student_id: document.getElementById('student').value || "NA",
                images: Array.from(document.querySelectorAll('canvas')).map(c => c.toDataURL("image/png"))
            };
            try {
                await fetch('/submit', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(data) });
                alert("RMA Submitted!"); location.reload();
            } catch (e) { alert("Error connecting to Teacher PC!"); btn.disabled = false; }
        }

        showQuestion(0);
    </script>
</body>
</html>
